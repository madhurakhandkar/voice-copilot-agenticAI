<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japandi Learning Companion</title>
    
    <!-- Fonts: Lora (Serif) for headers, Nunito Sans (Humanist) for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- MUI -->
    <script src="https://unpkg.com/@mui/material@5.14.18/umd/material-ui.production.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11.11.1/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.0/dist/emotion-styled.umd.min.js"></script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <style>
        body { margin: 0; padding: 0; background-color: #F2F0E9; }
        /* Smooth transition for progress bars */
        .MuiLinearProgress-bar {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const {
            createTheme,
            ThemeProvider,
            CssBaseline,
            Box,
            Typography,
            TextField,
            Button,
            Card,
            CardContent,
            LinearProgress,
            List,
            ListItem,
            Stack,
            Chip,
            IconButton,
            Paper,
            Divider,
            Fade,
            Container,
            Grid
        } = MaterialUI;

        const { useState, useEffect, useRef } = React;

        // --- Design Tokens (Japandi) ---
        const palette = {
            bg: '#F2F0E9',       // Warm Stone
            surface: '#FFFFFF',   // Clean White
            surfaceAlt: '#EBE9E1', // Slightly darker stone
            textPrimary: '#2C2C2C', // Deep Charcoal
            textSecondary: '#595959', // Soft Grey
            accent: '#D48C70',    // Soft Terracotta
            sage: '#819E8E',      // Muted Sage
            divider: 'rgba(0,0,0,0.06)'
        };

        const theme = createTheme({
            palette: {
                background: {
                    default: palette.bg,
                    paper: palette.surface,
                },
                primary: {
                    main: palette.textPrimary, // Use charcoal as primary for serious feel
                },
                secondary: {
                    main: palette.accent,
                },
                text: {
                    primary: palette.textPrimary,
                    secondary: palette.textSecondary,
                },
                success: {
                    main: palette.sage,
                }
            },
            typography: {
                fontFamily: '"Nunito Sans", "Helvetica", "Arial", sans-serif',
                h1: { fontFamily: '"Lora", serif', fontWeight: 600 },
                h2: { fontFamily: '"Lora", serif', fontWeight: 600 },
                h3: { fontFamily: '"Lora", serif', fontWeight: 600 },
                h4: { fontFamily: '"Lora", serif', fontWeight: 600 },
                h5: { fontFamily: '"Lora", serif', fontWeight: 600 },
                h6: { fontFamily: '"Lora", serif', fontWeight: 600, letterSpacing: '0.02em' },
                subtitle1: { letterSpacing: '0.02em' },
                button: { textTransform: 'none', fontWeight: 600, letterSpacing: '0.05em' },
            },
            shape: {
                borderRadius: 12,
            },
            components: {
                MuiButton: {
                    styleOverrides: {
                        root: {
                            borderRadius: 24,
                            padding: '10px 24px',
                            boxShadow: 'none',
                            '&:hover': {
                                boxShadow: '0 4px 12px rgba(0,0,0,0.05)',
                            }
                        }
                    }
                },
                MuiCard: {
                    styleOverrides: {
                        root: {
                            boxShadow: '0 4px 20px rgba(0,0,0,0.03)',
                            border: '1px solid rgba(0,0,0,0.02)',
                        }
                    }
                },
                MuiTextField: {
                    styleOverrides: {
                        root: {
                            '& .MuiOutlinedInput-root': {
                                backgroundColor: palette.surface,
                                '& fieldset': {
                                    borderColor: 'rgba(0,0,0,0.1)',
                                },
                                '&:hover fieldset': {
                                    borderColor: palette.sage,
                                },
                                '&.Mui-focused fieldset': {
                                    borderColor: palette.accent,
                                    borderWidth: '1px',
                                },
                            }
                        }
                    }
                },
                MuiLinearProgress: {
                    styleOverrides: {
                        root: {
                            borderRadius: 4,
                            backgroundColor: 'rgba(0,0,0,0.05)',
                        },
                        bar: {
                            borderRadius: 4,
                        }
                    }
                }
            }
        });

        // --- Mock Data & Helpers ---
        const initialJourneys = [
            { id: 1, name: 'Current Session', url: 'active-learning', progress: 0 },
        ];

        const getDomainName = (url) => {
            try {
                // Simple extraction
                let domain = url.replace(/^(https?:\/\/)?(www\.)?/, '');
                domain = domain.split('/')[0];
                return domain.charAt(0).toUpperCase() + domain.slice(1);
            } catch (e) {
                return 'Unknown Source';
            }
        };

        // --- Components ---

        const JourneyCard = ({ journey }) => {
            return (
                <Card sx={{ mb: 2, bgcolor: 'background.paper', transition: 'transform 0.2s', '&:hover': { transform: 'translateY(-2px)' } }}>
                    <CardContent sx={{ pb: '16px !important' }}>
                        <Box display="flex" justifyContent="space-between" alignItems="baseline" mb={1}>
                            <Typography variant="h6" sx={{ fontSize: '1rem', color: palette.textPrimary }}>
                                {journey.name}
                            </Typography>
                            <Typography variant="caption" sx={{ color: palette.accent, fontWeight: 700 }}>
                                {Math.round(journey.progress)}%
                            </Typography>
                        </Box>
                        <Typography variant="body2" sx={{ color: palette.textSecondary, fontSize: '0.8rem', mb: 1.5, display: 'flex', alignItems: 'center', gap: 0.5 }}>
                            <span className="material-icons" style={{ fontSize: 14 }}>link</span>
                            {journey.url}
                        </Typography>
                        <LinearProgress 
                            variant="determinate" 
                            value={journey.progress} 
                            sx={{ 
                                height: 6, 
                                '& .MuiLinearProgress-bar': { 
                                    backgroundColor: journey.progress >= 100 ? palette.sage : palette.accent 
                                } 
                            }} 
                        />
                    </CardContent>
                </Card>
            );
        };

        const ChatMessage = ({ msg }) => {
            const isAi = msg.sender === 'ai';
            return (
                <Box sx={{ 
                    display: 'flex', 
                    justifyContent: isAi ? 'flex-start' : 'flex-end', 
                    mb: 3 
                }}>
                    <Box sx={{ 
                        maxWidth: '70%', 
                        p: 3, 
                        borderRadius: isAi ? '4px 20px 20px 20px' : '20px 4px 20px 20px',
                        bgcolor: isAi ? palette.surface : palette.textPrimary,
                        color: isAi ? palette.textPrimary : '#FFF',
                        boxShadow: '0 2px 10px rgba(0,0,0,0.05)'
                    }}>
                        <Typography variant="body1" sx={{ lineHeight: 1.7 }}>
                            {msg.text}
                        </Typography>
                        {msg.url && (
                            <Chip 
                                icon={<span className="material-icons" style={{color: isAi ? palette.accent : '#FFF'}}>link</span>}
                                label={msg.url} 
                                size="small" 
                                sx={{ 
                                    mt: 2, 
                                    bgcolor: isAi ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.2)',
                                    color: 'inherit'
                                }} 
                            />
                        )}
                    </Box>
                </Box>
            );
        };

        const App = () => {
            const [journeys, setJourneys] = useState(initialJourneys);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [urlInput, setUrlInput] = useState('');
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // Poll backend for new messages every 2 seconds
            useEffect(() => {
                const interval = setInterval(async () => {
                    try {
                        const res = await fetch('/messages');
                        if (res.ok) {
                            const data = await res.json();
                            setMessages(data);
                        }
                    } catch (_) {}
                }, 2000);
                return () => clearInterval(interval);
            }, []);

            const handleSend = async () => {
                if (!input.trim()) return;

                const payload = { text: input, url: urlInput || undefined };

                setInput('');
                setUrlInput('');

                try {
                    await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                } catch (e) {
                    console.error("Failed to send message:", e);
                }
            };

            return (
                <ThemeProvider theme={theme}>
                    <CssBaseline />
                    <Box sx={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
                        
                        {/* Sidebar Dashboard */}
                        <Box sx={{ 
                            width: 320, 
                            flexShrink: 0, 
                            bgcolor: palette.surfaceAlt, 
                            borderRight: '1px solid rgba(0,0,0,0.05)',
                            display: 'flex',
                            flexDirection: 'column',
                            p: 3
                        }}>
                            <Typography variant="h5" sx={{ mb: 1, color: palette.textPrimary }}>
                                Active Journeys
                            </Typography>
                            <Typography variant="body2" sx={{ mb: 4, color: palette.textSecondary }}>
                                Your learning progress
                            </Typography>
                            
                            <Box sx={{ overflowY: 'auto', flex: 1, pr: 1 }}>
                                {journeys.map(journey => (
                                    <JourneyCard key={journey.id} journey={journey} />
                                ))}
                            </Box>
                        </Box>

                        {/* Main Chat Area */}
                        <Box sx={{ flex: 1, display: 'flex', flexDirection: 'column', position: 'relative' }}>
                            
                            {/* Header */}
                            <Box sx={{ p: 3, borderBottom: '1px solid rgba(0,0,0,0.05)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <Typography variant="h4" sx={{ color: palette.textPrimary }}>
                                    Learning Companion
                                </Typography>
                                <Chip label="Beta v1.0" size="small" sx={{ bgcolor: palette.sage, color: '#FFF' }} />
                            </Box>

                            {/* Messages */}
                            <Box sx={{ flex: 1, overflowY: 'auto', p: 4, bgcolor: palette.bg }}>
                                <Container maxWidth="md">
                                    {messages.map(msg => (
                                        <ChatMessage key={msg.id} msg={msg} />
                                    ))}
                                    <div ref={messagesEndRef} />
                                </Container>
                            </Box>

                            {/* Input Area */}
                            <Box sx={{ p: 4, bgcolor: palette.bg, borderTop: '1px solid rgba(0,0,0,0.05)' }}>
                                <Container maxWidth="md">
                                    <Paper elevation={0} sx={{ 
                                        p: 2, 
                                        border: `1px solid ${palette.divider}`,
                                        borderRadius: 3,
                                        display: 'flex',
                                        flexDirection: 'column',
                                        gap: 2
                                    }}>
                                        <TextField
                                            fullWidth
                                            multiline
                                            rows={2}
                                            placeholder="What do you want to learn today?"
                                            variant="standard"
                                            InputProps={{ disableUnderline: true, style: { fontSize: '1.1rem' } }}
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            onKeyPress={(e) => {
                                                if (e.key === 'Enter' && !e.shiftKey) {
                                                    e.preventDefault();
                                                    handleSend();
                                                }
                                            }}
                                        />
                                        
                                        <Box sx={{ display: 'flex', gap: 2, alignItems: 'center' }}>
                                            <Box sx={{ 
                                                flex: 1, 
                                                display: 'flex', 
                                                alignItems: 'center', 
                                                bgcolor: palette.bg, 
                                                borderRadius: 2, 
                                                px: 2, 
                                                py: 0.5 
                                            }}>
                                                <span className="material-icons" style={{ color: palette.textSecondary, marginRight: 8 }}>link</span>
                                                <TextField 
                                                    fullWidth 
                                                    placeholder="Attach URL (e.g., documentation.com)" 
                                                    variant="standard"
                                                    InputProps={{ disableUnderline: true, style: { fontSize: '0.9rem' } }}
                                                    value={urlInput}
                                                    onChange={(e) => setUrlInput(e.target.value)}
                                                />
                                            </Box>
                                            <Button 
                                                variant="contained" 
                                                color="primary" 
                                                endIcon={<span className="material-icons">arrow_forward</span>}
                                                onClick={handleSend}
                                                disabled={!input.trim()}
                                            >
                                                Start
                                            </Button>
                                        </Box>
                                    </Paper>
                                </Container>
                            </Box>
                        </Box>
                    </Box>
                </ThemeProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
